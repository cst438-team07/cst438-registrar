spring.application.name=registrar
server.port=8080
spring.jpa.hibernate.ddl-auto=update
# set show-sql=true for debugging
spring.jpa.show-sql=false
rsa.privateKey = classpath:certs/private.pem
rsa.publicKey = classpath:certs/public.pem
spring.sql.init.continue-on-error=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=jdbc:h2:mem:testdb;NON_KEYWORDS=USER;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE